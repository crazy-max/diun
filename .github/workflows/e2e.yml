name: e2e

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
      - 'v*'
  pull_request:
    branches:
      - 'master'
      - 'v*'

env:
  BUILD_TAG: 'diun:local'
  CONTAINER_NAME: 'diun'
  DOCKER_BUILD_SUMMARY: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:6.2.3-alpine@sha256:f8f0e809a4281714c33edf86f6da6cc2d4058c8549e44d8c83303c28b3123072
      cloudflared:
        image: crazymax/cloudflared:latest@sha256:9b4e856d18f6f6367330c56d91452f5fe3b6bd235f1210dcd9f6bd7373cad9be
        options: >-
          --label "diun.enable=true"
          --label "diun.watch_repo=true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - folder: docker1
            loglevel: debug
          - folder: docker2
            loglevel: info
          - folder: docker3
            loglevel: info
          - folder: docker4
            loglevel: info
          - folder: docker5
            loglevel: info
          - folder: dockerfile1
            loglevel: debug
          - folder: dockerfile2
            loglevel: debug
          - folder: file1
            loglevel: debug
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      -
        name: Build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          targets: image-local
      -
        name: Start container
        run: |
          volFlags="-v $(pwd)/test/${{ matrix.folder }}/diun.yml:/diun.yml:ro"
          volFlags="-v /var/run/docker.sock:/var/run/docker.sock ${volFlags}"
          if [ -d "$(pwd)/test/${{ matrix.folder }}/mount" ]; then
            volFlags="-v $(pwd)/test/${{ matrix.folder }}/mount:/mount ${volFlags}"
          fi
          docker run -d --name ${{ env.CONTAINER_NAME }} ${volFlags} \
            -e "TZ=Europe/Paris" \
            -e "LOG_LEVEL=${{ matrix.loglevel }}" \
            ${{ env.BUILD_TAG }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@bbd31df64ee0f097a02f12495f541f9236f18c46 # v1.2.0
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: "Next run in"
          timeout: 240
      -
        name: List images in db
        run: |
          docker exec -t ${{ env.CONTAINER_NAME }} diun image list
      -
        name: Container logs
        if: always()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}
          docker rm -f ${{ env.CONTAINER_NAME }} > /dev/null 2>&1 || true

  metrics:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      -
        name: Build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          targets: image-local
      -
        name: Start container
        run: |
          docker run -d --name ${{ env.CONTAINER_NAME }} \
            -p 127.0.0.1:9090:9090 \
            -v $(pwd)/test/metrics/diun.yml:/diun.yml:ro \
            -v $(pwd)/test/metrics/mount:/mount:ro \
            -e "TZ=Europe/Paris" \
            -e "LOG_LEVEL=debug" \
            ${{ env.BUILD_TAG }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@bbd31df64ee0f097a02f12495f541f9236f18c46 # v1.2.0
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: "Next run in"
          timeout: 240
      -
        name: Check metrics endpoint
        run: |
          status="$(curl -sS -o /tmp/diun-metrics-unauthorized.out -w "%{http_code}" http://127.0.0.1:9090/metrics)"
          test "$status" = "401"
          curl -fsS -H "Authorization: Bearer diun-metrics-e2e-token" http://127.0.0.1:9090/metrics | tee /tmp/diun-metrics.out
          grep -q '^diun_build_info{version=' /tmp/diun-metrics.out
          grep -q '^diun_watch_runs_total 1' /tmp/diun-metrics.out
          grep -q '^diun_watch_last_run_timestamp_seconds ' /tmp/diun-metrics.out
      -
        name: List images in db
        run: |
          docker exec -t ${{ env.CONTAINER_NAME }} diun image list
      -
        name: Container logs
        if: always()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}
          docker rm -f ${{ env.CONTAINER_NAME }} > /dev/null 2>&1 || true
