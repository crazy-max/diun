name: e2e

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
      - 'v*'
  pull_request:
    branches:
      - 'master'
      - 'v*'

env:
  BUILD_TAG: 'diun:local'
  CONTAINER_NAME: 'diun'
  DOCKER_BUILD_SUMMARY: false
  NOMAD_IMAGE: 'hashicorp/nomad:2.0.2@sha256:5eed30ce9cdde08f8761eb05a71e1aa3d81413f1e9e24bd088ec92cf8b8c61ba'

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:6.2.3-alpine@sha256:f8f0e809a4281714c33edf86f6da6cc2d4058c8549e44d8c83303c28b3123072
      cloudflared:
        image: crazymax/cloudflared:latest@sha256:9b4e856d18f6f6367330c56d91452f5fe3b6bd235f1210dcd9f6bd7373cad9be
        options: >-
          --label "diun.enable=true"
          --label "diun.watch_repo=true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - folder: docker1
            loglevel: debug
          - folder: docker2
            loglevel: info
          - folder: docker3
            loglevel: info
          - folder: docker4
            loglevel: info
          - folder: docker5
            loglevel: info
          - folder: dockerfile1
            loglevel: debug
          - folder: dockerfile2
            loglevel: debug
          - folder: file1
            loglevel: debug
          - folder: file-artifact
            loglevel: debug
    steps:
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      -
        name: Build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          targets: image-local
      -
        name: Start container
        run: |
          volFlags="-v $(pwd)/test/${{ matrix.folder }}/diun.yml:/diun.yml:ro"
          volFlags="-v /var/run/docker.sock:/var/run/docker.sock ${volFlags}"
          if [ -d "$(pwd)/test/${{ matrix.folder }}/mount" ]; then
            volFlags="-v $(pwd)/test/${{ matrix.folder }}/mount:/mount ${volFlags}"
          fi
          docker run -d --name ${{ env.CONTAINER_NAME }} ${volFlags} \
            --health-cmd "diun healthcheck" \
            --health-interval 30s \
            --health-timeout 5s \
            --health-retries 3 \
            --health-start-period 60s \
            -e "TZ=Europe/Paris" \
            -e "LOG_LEVEL=${{ matrix.loglevel }}" \
            ${{ env.BUILD_TAG }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@bbd31df64ee0f097a02f12495f541f9236f18c46 # v1.2.0
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: "Next run in"
          timeout: 240
      -
        name: List images in db
        run: |
          docker exec -t ${{ env.CONTAINER_NAME }} diun image list
      -
        name: Healthcheck
        run: |
          docker exec -t ${{ env.CONTAINER_NAME }} diun healthcheck
      -
        name: Container logs
        if: always()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}
          docker rm -f ${{ env.CONTAINER_NAME }} > /dev/null 2>&1 || true

  containerd:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      -
        name: Build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          targets: image-local
      -
        name: Start containerd fixture
        run: |
          if ! command -v ctr > /dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y containerd
          fi
          sudo systemctl is-active --quiet containerd || sudo systemctl start containerd
          sudo ctr version
          sudo ctr --namespace diun-e2e image pull docker.io/library/busybox:1.36.1
          sudo ctr --namespace diun-e2e run --detach --label diun.enable=true docker.io/library/busybox:1.36.1 diun-e2e-busybox sleep 300
          sudo ctr --namespace diun-e2e containers list
          sudo ctr --namespace diun-e2e tasks list
      -
        name: Start container
        run: |
          docker run -d --name ${{ env.CONTAINER_NAME }} \
            --health-cmd "diun healthcheck" \
            --health-interval 30s \
            --health-timeout 5s \
            --health-retries 3 \
            --health-start-period 60s \
            -v /run/containerd/containerd.sock:/run/containerd/containerd.sock \
            -v $(pwd)/test/containerd1/diun.yml:/diun.yml:ro \
            -e "TZ=Europe/Paris" \
            -e "LOG_LEVEL=debug" \
            ${{ env.BUILD_TAG }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@bbd31df64ee0f097a02f12495f541f9236f18c46 # v1.2.0
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: "Next run in"
          timeout: 240
      -
        name: List images in db
        run: |
          docker exec ${{ env.CONTAINER_NAME }} diun image list --raw | tee /tmp/diun-containerd-images.json
          jq -e '.images[] | select(.name == "docker.io/library/busybox" and .latest.tag == "1.36.1")' /tmp/diun-containerd-images.json
      -
        name: Healthcheck
        run: |
          docker exec -t ${{ env.CONTAINER_NAME }} diun healthcheck --raw
      -
        name: Container logs
        if: always()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}
          docker rm -f ${{ env.CONTAINER_NAME }} > /dev/null 2>&1 || true
          if command -v ctr > /dev/null 2>&1; then
            sudo ctr --namespace diun-e2e tasks kill diun-e2e-busybox > /dev/null 2>&1 || true
            sudo ctr --namespace diun-e2e tasks rm --force diun-e2e-busybox > /dev/null 2>&1 || true
            sudo ctr --namespace diun-e2e containers rm diun-e2e-busybox > /dev/null 2>&1 || true
          fi

  nomad:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      -
        name: Build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          targets: image-local
      -
        name: Start Nomad fixture
        run: |
          docker network create diun-e2e-nomad
          docker run -d --name nomad \
            --network diun-e2e-nomad \
            --network-alias nomad \
            -v $(pwd)/test/nomad1:/fixtures:ro \
            -e "NOMAD_SKIP_DOCKER_IMAGE_WARN=1" \
            ${{ env.NOMAD_IMAGE }} \
            agent "-config=/fixtures/nomad.hcl"
          for i in {1..30}; do
            if docker exec nomad nomad status > /dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              docker logs nomad
              exit 1
            fi
            sleep 2
          done
          docker exec nomad nomad job run -detach /fixtures/job.nomad.hcl
          docker exec nomad nomad job status diun-e2e
      -
        name: Start container
        run: |
          docker run -d --name ${{ env.CONTAINER_NAME }} \
            --network diun-e2e-nomad \
            --health-cmd "diun healthcheck" \
            --health-interval 30s \
            --health-timeout 5s \
            --health-retries 3 \
            --health-start-period 60s \
            -v $(pwd)/test/nomad1/diun.yml:/diun.yml:ro \
            -e "TZ=Europe/Paris" \
            -e "LOG_LEVEL=debug" \
            ${{ env.BUILD_TAG }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@bbd31df64ee0f097a02f12495f541f9236f18c46 # v1.2.0
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: "Next run in"
          timeout: 240
      -
        name: List images in db
        run: |
          docker exec ${{ env.CONTAINER_NAME }} diun image list --raw | tee /tmp/diun-nomad-images.json
          jq -e '.images[] | select(.name == "docker.io/library/busybox" and .latest.tag == "1.36.1")' /tmp/diun-nomad-images.json
      -
        name: Healthcheck
        run: |
          docker exec -t ${{ env.CONTAINER_NAME }} diun healthcheck --raw
      -
        name: Container logs
        if: always()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}
          docker logs nomad
          docker rm -f ${{ env.CONTAINER_NAME }} nomad > /dev/null 2>&1 || true
          docker network rm diun-e2e-nomad > /dev/null 2>&1 || true

  metrics:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      -
        name: Build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          targets: image-local
      -
        name: Start container
        run: |
          docker run -d --name ${{ env.CONTAINER_NAME }} \
            --health-cmd "diun healthcheck" \
            --health-interval 30s \
            --health-timeout 5s \
            --health-retries 3 \
            --health-start-period 60s \
            -p 127.0.0.1:9090:9090 \
            -v $(pwd)/test/metrics/diun.yml:/diun.yml:ro \
            -v $(pwd)/test/metrics/mount:/mount:ro \
            -e "TZ=Europe/Paris" \
            -e "LOG_LEVEL=debug" \
            ${{ env.BUILD_TAG }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@bbd31df64ee0f097a02f12495f541f9236f18c46 # v1.2.0
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: "Next run in"
          timeout: 240
      -
        name: Check metrics endpoint
        run: |
          status="$(curl -sS -o /tmp/diun-metrics-unauthorized.out -w "%{http_code}" http://127.0.0.1:9090/metrics)"
          test "$status" = "401"
          curl -fsS -H "Authorization: Bearer diun-metrics-e2e-token" http://127.0.0.1:9090/metrics | tee /tmp/diun-metrics.out
          grep -q '^diun_build_info{version=' /tmp/diun-metrics.out
          grep -q '^diun_watch_runs_total 1' /tmp/diun-metrics.out
          grep -q '^diun_watch_last_run_timestamp_seconds ' /tmp/diun-metrics.out
      -
        name: List images in db
        run: |
          docker exec -t ${{ env.CONTAINER_NAME }} diun image list
      -
        name: Healthcheck
        run: |
          docker exec -t ${{ env.CONTAINER_NAME }} diun healthcheck --raw
      -
        name: Container logs
        if: always()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}
          docker rm -f ${{ env.CONTAINER_NAME }} > /dev/null 2>&1 || true
